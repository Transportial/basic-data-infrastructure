name: CI

on:
  pull_request:
  push:
    branches: [main, 'release/*', 'claude/**']
    tags: ['v*']

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Run tests with coverage
        run: bun test --coverage
        env:
          CI: true

  # Images are built on every push (to catch Dockerfile regressions) but never
  # pushed from CI. Operators cut a release tag and publish images manually or
  # via a trusted runner that has `packages: write` on the org.
  build-images:
    needs: lint-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [asr, ors, con]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Lowercase the repository name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.bun
          build-args: APP=${{ matrix.app }}
          push: false
          load: true
          tags: ghcr.io/${{ steps.repo.outputs.name }}/${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
