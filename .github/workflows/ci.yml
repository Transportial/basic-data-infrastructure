name: CI

on:
  pull_request:
  push:
    branches: [main, 'release/*', 'claude/**']
    tags: ['v*']

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Run tests with coverage
        run: bun test --coverage
        env:
          CI: true

  build-images:
    needs: lint-test
    # Build on every push to make sure the Dockerfile compiles, but only push
    # to GHCR on tagged releases. Tag pushes require the workflow runner to
    # hold `packages: write` on the org — when that permission is absent,
    # cut a fork tag and retag manually.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [asr, ors, con]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Lowercase the repository name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (no push)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.bun
          build-args: APP=${{ matrix.app }}
          push: false
          tags: ghcr.io/${{ steps.repo.outputs.name }}/${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push (tag release)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.bun
          build-args: APP=${{ matrix.app }}
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/${{ matrix.app }}:${{ github.ref_name }}
            ghcr.io/${{ steps.repo.outputs.name }}/${{ matrix.app }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
